<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;background:#f4f6f9;padding:20px}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,.1)}
input,button{padding:8px;margin:5px;border-radius:8px;border:1px solid #ccc}
button{cursor:pointer;background:#4CAF50;color:white;border:none}
button:hover{opacity:.8}
.danger{background:#e74c3c}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#4CAF50;color:white}
.total{font-weight:bold;margin-top:10px;font-size:18px}
#mainApp{display:none}
</style>
</head>

<body>

<div id="loginBox">
<h2>🔐 เข้าสู่ระบบ</h2>
<input type="password" id="password" placeholder="ใส่รหัสผ่าน">
<button onclick="login()">เข้าสู่ระบบ</button>
</div>

<div class="container" id="mainApp">
<h2>💰 ระบบบันทึกหนี้</h2>

<input type="text" id="debtorId" placeholder="รหัสลูกหนี้" onkeyup="autoFillName()">
<input type="text" id="name" placeholder="ชื่อ">
<input type="number" id="amount" placeholder="จำนวนเงิน">
<input type="date" id="date">
<button onclick="addDebt()">เพิ่ม</button>
<button onclick="clearAll()" class="danger">ล้างทั้งหมด</button>

<table>
<thead>
<tr>
<th>รหัส</th>
<th>ชื่อ</th>
<th>จำนวนเงิน</th>
<th>วันที่</th>
<th>ลบ</th>
</tr>
</thead>
<tbody id="debtTable"></tbody>
</table>

<div class="total" id="totalAmount"></div>
<div id="summaryByPerson"></div>

<h3>📊 กราฟสรุปยอดตามลูกหนี้</h3>
<canvas id="chart"></canvas>

</div>

<script>
const APP_PASSWORD="12345";
let debts=JSON.parse(localStorage.getItem("debts"))||[];

const debtorList = {
"001":"THAN KYING",
"002":"NAY MYO",
"003":"ARKAR SOE",
"004":"AUNG MOE KO",
"005":"THEIN ZAW HTWE"
};
  
function login(){
const pass=document.getElementById("password").value;
if(pass===APP_PASSWORD){
document.getElementById("loginBox").style.display="none";
document.getElementById("mainApp").style.display="block";
renderTable();
}else{
alert("รหัสผิด");
}
}
function autoFillName(){
const id=document.getElementById("debtorId").value;
const name=debtorList[id] || "";
document.getElementById("name").value=name;
}  
function save(){
localStorage.setItem("debts",JSON.stringify(debts));
}

function addDebt(){
const debtorId=document.getElementById("debtorId").value.trim();
const name=document.getElementById("name").value.trim();
const amount=Number(document.getElementById("amount").value);
const date=document.getElementById("date").value;

if(!debtorId||!name||!amount||!date){
alert("กรอกให้ครบ");
return;
}

debts.push({debtorId,name,amount,date});
save();
renderTable();

document.getElementById("debtorId").value="";
document.getElementById("name").value="";
document.getElementById("amount").value="";
document.getElementById("date").value="";
}

function deleteDebt(index){
debts.splice(index,1);
save();
renderTable();
}

function clearAll(){
if(confirm("ล้างข้อมูลทั้งหมด?")){
debts=[];
save();
renderTable();
}
}

function renderTable(){
const table=document.getElementById("debtTable");
table.innerHTML="";
let total=0;

debts.forEach((d,i)=>{
total+=d.amount;
table.innerHTML+=`
<tr>
<td>${d.debtorId}</td>
<td>${d.name}</td>
<td>${d.amount.toLocaleString()}</td>
<td>${d.date}</td>
<td><button class="danger" onclick="deleteDebt(${i})">ลบ</button></td>
</tr>`;
});

document.getElementById("totalAmount").innerText="รวมทั้งหมด: "+total.toLocaleString()+" บาท";

renderSummary();
renderChart();
}

function renderSummary(){
const summary={};
debts.forEach(d=>{
summary[d.name]=(summary[d.name]||0)+d.amount;
});

let html="<h3>📌 สรุปยอดรายคน</h3>";
for(let name in summary){
html+=name+" : "+summary[name].toLocaleString()+" บาท<br>";
}
document.getElementById("summaryByPerson").innerHTML=html;
}

function renderChart(){
const summary={};
debts.forEach(d=>{
summary[d.name]=(summary[d.name]||0)+d.amount;
});

const ctx=document.getElementById("chart").getContext("2d");

if(chart){
chart.destroy();
}

chart=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(summary),
datasets:[{
label:"ยอดหนี้",
data:Object.values(summary)
}]
}
});
}
</script>
